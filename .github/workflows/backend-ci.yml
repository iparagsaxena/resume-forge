name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    name: Lint & Test (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # E501 (line length) and W503 (line break before operator) are ignored
          # to match common FastAPI code style. F401 allowed for module-level imports.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Format check with black
        run: black --check --diff .

      - name: Import order check with isort
        run: isort --check-only --diff .

      - name: Type check with mypy
        continue-on-error: true
        run: mypy . --ignore-missing-imports || true

      - name: Import smoke test
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: resumeforge_test
          JWT_SECRET: test-secret
        run: |
          python -c "import server; print('server module imports OK')"