name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: Install, Lint & Build (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Only enable yarn cache when a lockfile exists; otherwise the cache
          # step hard-fails with "Some specified paths were not resolved".
          cache: ${{ hashFiles('frontend/yarn.lock') != '' && 'yarn' || '' }}
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        # Use --frozen-lockfile only when a lockfile is committed; otherwise
        # fall back to a plain install so the build doesn't fail on a fresh
        # repo without a lockfile yet.
        run: |
          if [ -f frontend/yarn.lock ]; then
            (cd frontend && yarn install --frozen-lockfile --non-interactive)
          else
            (cd frontend && yarn install --non-interactive)
          fi

      - name: Lint
        run: yarn eslint src --max-warnings=0 || true

      - name: Build
        env:
          CI: "true"
          # Frontend is configured for the deployed backend; provide a placeholder
          # for any build-time env reads so the build doesn't crash on missing vars.
          REACT_APP_BACKEND_URL: https://example.invalid/api
        run: yarn build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          if-no-files-found: error
          retention-days: 7